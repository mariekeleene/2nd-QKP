<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* Body als achtergrond */
        body {
            position: relative;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Wrapper op 25% hoogte */
        .dropdown-wrapper {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Toggle / trigger — ZELFDE BREEDTE ALS MENU */
        .dropdown-trigger {
            width: 220px;
            padding: 8px 14px;
            font-size: 14px;
            background: #e6e6e6;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;

            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Arrow */
        .arrow {
            font-size: 10px;
            transition: transform 0.3s ease;
        }

        /* Arrow rotate */
        .dropdown-wrapper.open .arrow {
            transform: rotate(180deg);
        }

        /* Menu – opent onder toggle */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 6px;

            width: 220px;
            background: #f1dbe5;
            border-radius: 16px;

            /* MEER RUIMTE BINNEN */
            padding: 14px 0;

            box-shadow: 0 10px 30px rgba(0,0,0,0.25);

            max-height: 0;
            overflow-y: auto;
            opacity: 0;

            transition: max-height 0.4s ease, opacity 0.3s ease;
        }

        /* Scrollbar verbergen */
        .dropdown-menu::-webkit-scrollbar {
            width: 0;
        }
        .dropdown-menu {
            scrollbar-width: none;
        }

        /* Open */
        .dropdown-wrapper.open .dropdown-menu {
            max-height: 440px;
            opacity: 1;
        }

        /* Items — LOSER, MEER LUCHT */
        .item {
            display: block;

            /* meer afstand van borders */
            padding: 10px 22px;
            padding-left: 30px;
            padding-right: 30px;
            padding-bottom: 30px;

            font-size: 15px;
            line-height: 1.6;   /* MEER REGELAFSTAND */

            color: #111;
            text-decoration: none;
            white-space: nowrap;
        }

        /* Hover */
        .item:hover {
            background: rgba(255,255,255,0.4);
        }

        /* Active item */
        .item.active {
            background: #ec5a8c;
            color: white;
            font-weight: 500;

            border-radius: 12px;

            /* extra marge zodat hij "zweeft" */
            margin: 6px 14px;
        }
    </style>
</head>

<body>

<div class="dropdown-wrapper" id="dropdown">
    <div class="dropdown-trigger" id="trigger">
        <span>Open</span>
        <span class="arrow">▼</span>
    </div>

    <div class="dropdown-menu">
        <a href="Fountain.html" class="item">Fountain</a>
        <a href="Concrete.html" class="item">Concrete</a>
        <a href="7.html" class="item">7 Trees</a>
        <a href="Hard.html" class="item">Hard Working</a>
        <a href="Immigration.html" class="item">Immigration Celebration/ Welcome Home</a>
        <a href="Stills.html" class="item">Stills</a>
        <a href="We.html" class="item">WNFBNTO</a>
        <a href="index.html" class="item active">✓ Open</a>
        <a href="Prazer.html" class="item">Prazer em Conhecer-te</a>
        <a href="Lets.html" class="item">Lets Keep It Gezellig</a>
        <a href="These.html" class="item">These Were All My Clothes</a>
        <a href="about.html" class="item">About Me</a>
        <a href="Gezellig.html" class="item">Gezellig / Ongezellig</a>
        <a href="Screen.html" class="item">Screen Based Works - 2020</a>
        <a href="paintings.html" class="item">Cow to 3d Printer</a>
        <a href="Space.html" class="item">[ Space Waste book - 2019 ]</a>
    </div>
</div>

<script>
    /* Toggle */
    const dropdown = document.getElementById("dropdown");
    const trigger = document.getElementById("trigger");

    trigger.addEventListener("click", (e) => {
        e.stopPropagation();
        dropdown.classList.toggle("open");
    });

    /* Close on outside click */
    document.addEventListener("click", () => {
        dropdown.classList.remove("open");
    });

    /* Background slideshow */
    const images = [
        "img/bg1.jpg",
        "img/bg2.jpg",
        "img/bg3.jpg"
    ];

    let i = 0;
    function changeBackground() {
        document.body.style.backgroundImage = `url(${images[i]})`;
        i = (i + 1) % images.length;
    }

    changeBackground();
    setInterval(changeBackground, 6000);
</script>

</body>
</html>
