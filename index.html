<script>

    function setupDropdown(number) {
        const dropdown = document.getElementById("dropdown" + number);
        const trigger = document.getElementById("trigger" + number);

        trigger.addEventListener("click", (e) => {
            e.stopPropagation();
            dropdown.classList.toggle("open");
        });

        document.addEventListener("click", () => {
            dropdown.classList.remove("open");
        });
    }

    setupDropdown(1);
    setupDropdown(2);
    setupDropdown(3);
    setupDropdown(4);

    /* Background slideshow */

    const images = [
        "images/14.jpg",
        "images/15.jpg",
        "images/17.jpeg",
        "images/20.jpg",
        "images/28.jpg",
        "images/29.jpg",
        "images/30.jpg"
    ];

    let i = 0;
    function changeBackground() {
        document.body.style.backgroundImage = `url(${images[i]})`;
        i = (i + 1) % images.length;
    }

    changeBackground();
    setInterval(changeBackground, 6000);

</script>
