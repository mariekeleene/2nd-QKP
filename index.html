<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Wrapper */
        .dropdown-wrapper {
            position: relative;
        }

        /* Trigger */
        .dropdown-trigger {
            padding: 6px 12px;
            font-size: 14px;
            background: #e6e6e6;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Arrow */
        .arrow {
            font-size: 10px;
            transition: transform 0.3s ease;
        }

        /* Arrow rotate */
        .dropdown-wrapper.open .arrow {
            transform: rotate(180deg);
        }

        /* Menu */
        .dropdown-menu {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;

            background: #f1dbe5;
            border-radius: 16px;
            padding: 10px 0;

            box-shadow: 0 10px 30px rgba(0,0,0,0.25);

            max-height: 0;
            overflow-y: auto;
            opacity: 0;

            transition: max-height 0.4s ease, opacity 0.3s ease;
        }

        /* Hide scrollbar */
        .dropdown-menu::-webkit-scrollbar {
            width: 0;
        }
        .dropdown-menu {
            scrollbar-width: none;
        }

        /* Open */
        .dropdown-wrapper.open .dropdown-menu {
            max-height: 420px;
            opacity: 1;
        }

        /* Items */
        .item {
            display: block;
            padding: 8px 18px;
            font-size: 15px;
            color: #111;
            text-decoration: none;
            white-space: nowrap;
        }

        .item:hover {
            background: rgba(255,255,255,0.4);
        }

        /* Active */
        .item.active {
            background: #ec5a8c;
            color: white;
            font-weight: 500;
            border-radius: 12px;
            margin: 4px 10px;
        }
    </style>
</head>

<body>

<div class="dropdown-wrapper" id="dropdown">
    <div class="dropdown-trigger" id="trigger">
        striped penis
        <span class="arrow">▼</span>
    </div>

    <div class="dropdown-menu">
        <a href="browse.html" class="item">browse me</a>
        <a href="orgue.html" class="item">m.org.ue</a>
        <a href="songs.html" class="item">7 songs</a>
        <a href="dead-fly.html" class="item">dead fly</a>
        <a href="lullaby.html" class="item">Lullaby</a>
        <a href="cat.html" class="item">cat</a>
        <a href="flesh-blood.html" class="item">Flesh&amp;Blood</a>
        <a href="striped-penis.html" class="item active">✓ striped penis</a>
        <a href="mouchette.html" class="item">I love mouchette</a>
        <a href="dummy.html" class="item">dummy</a>
        <a href="shop.html" class="item">My Shop</a>
        <a href="about.html" class="item">About Me</a>
        <a href="paintings.html" class="item">paintings</a>
    </div>
</div>

<script>
    /* Dropdown toggle */
    const dropdown = document.getElementById("dropdown");
    const trigger = document.getElementById("trigger");

    trigger.addEventListener("click", (e) => {
        e.stopPropagation();
        dropdown.classList.toggle("open");
    });

    /* Close when clicking outside */
    document.addEventListener("click", () => {
        dropdown.classList.remove("open");
    });

    /* Background slideshow */
    const images = [
        "img/bg1.jpg",
        "img/bg2.jpg",
        "img/bg3.jpg"
    ];

    let i = 0;
    function changeBackground() {
        document.body.style.backgroundImage = `url(${images[i]})`;
        i = (i + 1) % images.length;
    }

    changeBackground();
    setInterval(changeBackground, 6000); // elke 6 seconden
</script>

</body>
</html>
