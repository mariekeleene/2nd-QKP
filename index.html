<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* hier kan later je slideshow */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Container */
        .dropdown-wrapper {
            position: relative;
        }

        /* Onderste klikbare label */
        .dropdown-trigger {
            padding: 6px 14px;
            font-size: 14px;
            background: #e6e6e6;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
        }

        /* Menu zelf */
        .dropdown-menu {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;

            background: #f1dbe5;
            border-radius: 16px;
            padding: 10px 0;

            box-shadow: 0 10px 30px rgba(0,0,0,0.2);

            max-height: 0;
            overflow: hidden;
            opacity: 0;

            transition: max-height 0.4s ease, opacity 0.3s ease;
        }

        /* Open toestand */
        .dropdown-menu.open {
            max-height: 420px;
            opacity: 1;
        }

        /* Items */
        .item {
            padding: 8px 18px;
            font-size: 15px;
            color: #111;
            cursor: pointer;
            white-space: nowrap;
        }

        .item:hover {
            background: rgba(255,255,255,0.4);
        }

        /* Actieve selectie */
        .item.active {
            background: #ec5a8c;
            color: white;
            font-weight: 500;
            border-radius: 12px;
            margin: 4px 10px;
        }
    </style>
</head>

<body>

<div class="dropdown-wrapper">
    <div class="dropdown-trigger" onclick="toggleMenu()">
        striped penis
    </div>

    <div class="dropdown-menu" id="menu">
        <div class="item">browse me</div>
        <div class="item">m.org.ue</div>
        <div class="item">7 songs</div>
        <div class="item">dead fly</div>
        <div class="item">Lullaby</div>
        <div class="item">cat</div>
        <div class="item">Flesh&amp;Blood</div>
        <div class="item active">✓ striped penis</div>
        <div class="item">I love mouchette</div>
        <div class="item">dummy</div>
        <div class="item">My Shop</div>
        <div class="item">About Me</div>
        <div class="item">paintings</div>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById("menu").classList.toggle("open");
    }
</script>

</body>
</html>
