<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
        }

        .menu-container {
            position: relative;
            text-align: center;
        }

        .menu-button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background: rgba(255,255,255,0.85);
            border: none;
            border-radius: 8px;
        }

        .menu-list {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 10px;
            width: 200px;
            max-height: 0;
            overflow: hidden;
            background: rgba(255,255,255,0.9);
            border-radius: 8px;
            transition: max-height 0.4s ease;
        }

        .menu-list.open {
            max-height: 300px;
        }

        .menu-list a {
            display: block;
            padding: 12px;
            text-decoration: none;
            color: black;
            border-bottom: 1px solid #ddd;
        }

        .menu-list a:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body>

<div class="menu-container">
    <button class="menu-button" onclick="toggleMenu()">Open projecten</button>
    <div class="menu-list" id="menu">
        <a href="#">Project 1</a>
        <a href="#">Project 2</a>
        <a href="#">Project 3</a>
        <a href="#">Project 4</a>
    </div>
</div>

<script>
    // Dropdown openen/sluiten
    function toggleMenu() {
        document.getElementById("menu").classList.toggle("open");
    }

    // Achtergrond slideshow
    const images = [
        "img/bg1.jpg",
        "img/bg2.jpg",
        "img/bg3.jpg"
    ];

    let index = 0;

    function changeBackground() {
        document.body.style.backgroundImage = `url(${images[index]})`;
        index = (index + 1) % images.length;
    }

    changeBackground();
    setInterval(changeBackground, 5000); // elke 5 seconden
</script>

</body>
</html>
