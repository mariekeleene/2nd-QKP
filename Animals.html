<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>also Animals</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow-x: hidden;
            font-family: sans-serif;
        }

        /* BACK BUTTON */
        #floating-back {
            position: fixed;
            width: 60px;
            z-index: 30;
            cursor: pointer;
        }

        /* BACKGROUND LAYER */
        #bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-img {
            position: absolute;
            width: 110%;
            height: 110%;
            object-fit: cover;
            filter: blur(40px) brightness(0.7);
            transform: scale(1.1);
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .bg-img.active {
            opacity: 1;
        }

        /* FOREGROUND FEED */
        #feed {
            position: relative;
            z-index: 2;
        }

        .item {
            height: 100vh;
            position: relative;
        }

        .fg {
            position: absolute;
            max-width: 70%;
            max-height: 70%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
    </style>
</head>

<body>

<a href="index.html">
    <img src="images/back.png" id="floating-back">
</a>

<!-- BACKGROUND CROSSFADE -->
<div id="bg-layer">
    <img class="bg-img active" id="bg1">
    <img class="bg-img" id="bg2">
</div>

<!-- FOREGROUND -->
<div id="feed"></div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const images = [
            "images/1a.jpg","images/2a.jpg","images/3a.jpg","images/4a.jpg",
            "images/6.jpg","images/7.jpg","images/8.jpg","images/9.jpg",
            "images/10.jpg","images/11.jpg","images/12.jpg","images/13.jpg",
            "images/14.jpg","images/15.jpg","images/16.jpg","images/17.jpg",
            "images/18.jpg","images/19.jpg","images/20.jpg","images/21.jpg",
            "images/22.jpg","images/23.jpg","images/24.jpg","images/25.jpg",
            "images/26.jpg","images/27.jpg","images/28.jpg","images/29.jpg","images/30.jpg"
        ];

        const feed = document.getElementById("feed");

        /* CREATE ITEMS */
        function addImages() {
            images.forEach(src => {
                const item = document.createElement("div");
                item.className = "item";

                const fg = document.createElement("img");
                fg.src = src;
                fg.className = "fg";

                item.appendChild(fg);
                feed.appendChild(item);
            });
        }

        addImages();

        /* INFINITE SCROLL */
        window.addEventListener("scroll", () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
                addImages();
            }
            updateBackground();
        });

        /* BACKGROUND CROSSFADE */
        const bg1 = document.getElementById("bg1");
        const bg2 = document.getElementById("bg2");

        let currentBg = 0;
        let lastSrc = "";

        function setBackground(src) {
            if (src === lastSrc) return;
            lastSrc = src;

            if (currentBg === 0) {
                bg2.src = src;
                bg2.classList.add("active");
                bg1.classList.remove("active");
                currentBg = 1;
            } else {
                bg1.src = src;
                bg1.classList.add("active");
                bg2.classList.remove("active");
                currentBg = 0;
            }
        }

        function updateBackground() {
            const items = document.querySelectorAll(".item");

            items.forEach(item => {
                const rect = item.getBoundingClientRect();

                if (rect.top < window.innerHeight * 0.6 &&
                    rect.bottom > window.innerHeight * 0.4) {

                    const img = item.querySelector(".fg");
                    if (img) setBackground(img.src);
                }
            });
        }

        /* INIT BACKGROUND */
        setBackground(images[0]);

        /* FLOATING BUTTON */
        const button = document.getElementById("floating-back");

        function moveButton() {
            const w = window.innerWidth - button.offsetWidth;
            const h = window.innerHeight - button.offsetHeight;

            const x = Math.random() * w;
            const y = Math.random() * h;

            button.style.left = x + "px";
            button.style.top = y + "px";
        }

        moveButton();
        setInterval(moveButton, 8000);

    });
</script>

</body>
</html>
