<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>also Animals</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #000;
        }

        /* BACK BUTTON */
        #floating-back {
            position: fixed;
            width: 60px;
            z-index: 10;
            cursor: pointer;
        }

        /* FEED */
        .feed-wrapper {
            padding: 10px;
        }

        .feed {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .feed img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* MOBILE tweak */
        @media (max-width: 600px) {
            .feed {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

<a href="index.html">
    <img src="images/back.png" id="floating-back">
</a>

<main class="feed-wrapper">
    <div id="feed" class="feed"></div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const images = [
            "images/1a.jpg","images/2a.jpg","images/3a.jpg","images/4a.jpg",
            "images/6.jpg","images/7.jpg","images/8.jpg","images/9.jpg",
            "images/10.jpg","images/11.jpg","images/12.jpg","images/13.jpg",
            "images/14.jpg","images/15.jpg","images/16.jpg","images/17.jpg",
            "images/18.jpg","images/19.jpg","images/20.jpg","images/21.jpg",
            "images/22.jpg","images/23.jpg","images/24.jpg","images/25.jpg",
            "images/26.jpg","images/27.jpg","images/28.jpg","images/29.jpg","images/30.jpg"
        ];

        const feed = document.getElementById("feed");

        function addImages() {
            images.forEach(src => {
                const img = document.createElement("img");
                img.src = src;
                img.loading = "lazy";
                feed.appendChild(img);
            });
        }

        /* initial load */
        addImages();

        /* infinite scroll */
        window.addEventListener("scroll", () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
                addImages();
            }
        });

        /* FLOATING BUTTON */
        const button = document.getElementById("floating-back");

        function moveButton() {
            const w = window.innerWidth - button.offsetWidth;
            const h = window.innerHeight - button.offsetHeight;

            const x = Math.random() * w;
            const y = Math.random() * h;

            button.style.left = x + "px";
            button.style.top = y + "px";
        }

        moveButton();
        setInterval(moveButton, 8000);
    });
</script>

</body>
</html>
