<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>also Animals</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: black;
            overflow-x: hidden;
        }

        /* BACK BUTTON */
        #floating-back {
            position: fixed;
            width: 60px;
            z-index: 20;
            cursor: pointer;
        }

        /* EACH IMAGE SECTION */
        .item {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* BLURRED BACKGROUND */
        .bg {
            position: absolute;
            width: 110%;
            height: 110%;
            object-fit: cover;
            filter: blur(40px);
            transform: scale(1.1);
            top: -5%;
            left: -5%;
        }

        /* SHARP FOREGROUND IMAGE */
        .fg {
            position: absolute;
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
    </style>
</head>

<body>

<a href="index.html">
    <img src="images/back.png" id="floating-back">
</a>

<div id="feed"></div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const images = [
            "images/1a.jpg","images/2a.jpg","images/3a.jpg","images/4a.jpg",
            "images/6.jpg","images/7.jpg","images/8.jpg","images/9.jpg",
            "images/10.jpg","images/11.jpg","images/12.jpg","images/13.jpg",
            "images/14.jpg","images/15.jpg","images/16.jpg","images/17.jpg",
            "images/18.jpg","images/19.jpg","images/20.jpg","images/21.jpg",
            "images/22.jpg","images/23.jpg","images/24.jpg","images/25.jpg",
            "images/26.jpg","images/27.jpg","images/28.jpg","images/29.jpg","images/30.jpg"
        ];

        const feed = document.getElementById("feed");

        function addImages() {
            images.forEach(src => {

                const item = document.createElement("div");
                item.className = "item";

                const bg = document.createElement("img");
                bg.src = src;
                bg.className = "bg";

                const fg = document.createElement("img");
                fg.src = src;
                fg.className = "fg";

                item.appendChild(bg);
                item.appendChild(fg);
                feed.appendChild(item);
            });
        }

        /* initial load */
        addImages();

        /* infinite scroll */
        window.addEventListener("scroll", () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
                addImages();
            }
        });

        /* FLOATING BUTTON */
        const button = document.getElementById("floating-back");

        function moveButton() {
            const w = window.innerWidth - button.offsetWidth;
            const h = window.innerHeight - button.offsetHeight;

            const x = Math.random() * w;
            const y = Math.random() * h;

            button.style.left = x + "px";
            button.style.top = y + "px";
        }

        moveButton();
        setInterval(moveButton, 8000);

    });
</script>

</body>
</html>
